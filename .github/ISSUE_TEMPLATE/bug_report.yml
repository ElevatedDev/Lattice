name: Bug report
description: Report incorrect behavior, regressions, or documentation errors.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal graph, command, or code needed to reproduce the issue.
      placeholder: |
        ./gradlew test --tests ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: JDK, OS/architecture, Lattice commit/version, and native backend status if relevant.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context

