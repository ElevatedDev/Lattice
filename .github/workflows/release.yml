name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  artifacts:
    name: Build release bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_VERSION=1.0-SNAPSHOT" >> "${GITHUB_ENV}"
          fi

      - name: Build Java release artifacts
        run: ./gradlew verifyReleaseArtifacts -PreleaseVersion="${RELEASE_VERSION}"

      - name: Build Linux native backend
        run: ./gradlew nativeBuildRelease

      - name: Upload Java artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lattice-java-artifacts
          path: |
            build/libs/*.jar
            build/publications/**

      - name: Upload Linux native backend
        uses: actions/upload-artifact@v4
        with:
          name: static-topology-native-linux
          path: native/static-topology-native/target/release/libstatic_topology_native.so

