<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="Lattice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <g transform="translate(20,20)">
    <!-- Lattice grid mark -->
    <g stroke="url(#g)" stroke-width="3" fill="none">
      <rect x="0" y="0" width="80" height="80" rx="6"/>
      <line x1="0" y1="26" x2="80" y2="26"/>
      <line x1="0" y1="53" x2="80" y2="53"/>
      <line x1="26" y1="0" x2="26" y2="80"/>
      <line x1="53" y1="0" x2="53" y2="80"/>
    </g>
    <g fill="#0ea5e9">
      <circle cx="13" cy="13" r="3"/>
      <circle cx="40" cy="40" r="3"/>
      <circle cx="67" cy="67" r="3"/>
      <circle cx="67" cy="13" r="3"/>
      <circle cx="13" cy="67" r="3"/>
    </g>
  </g>
  <text x="120" y="78" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="56" font-weight="700" fill="#0f172a" letter-spacing="-1">Lattice</text>
</svg>

