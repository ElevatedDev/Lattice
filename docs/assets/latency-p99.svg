<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="400" viewBox="0 0 1180 400">
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#102033}.title{font-size:24px;font-weight:700}.sub{font-size:13px;fill:#52616f}.axis{font-size:12px;fill:#52616f}.label{font-size:12px;fill:#52616f}.value{font-size:12px;font-weight:700}.small{font-size:11px;fill:#52616f}.grid{stroke:#d8dee8;stroke-width:1}.axisline{stroke:#475569;stroke-width:1.2}.err{stroke:#243447;stroke-width:1.5}.bar{rx:3}</style>
<rect width="1180" height="400" fill="white"/>
<text class="title" x="24" y="34">Isolated end-to-end p99 latency</text>
<text class="sub" x="24" y="58">Each row run in its own JMH invocation; bars show aggregate p99, whiskers show per-iteration p99 range</text>
<line class="grid" x1="300.0" y1="78" x2="300.0" y2="338"/>
<text class="axis" x="300.0" y="364" text-anchor="middle">10 ns</text>
<line class="grid" x1="500.0" y1="78" x2="500.0" y2="338"/>
<text class="axis" x="500.0" y="364" text-anchor="middle">100 ns</text>
<line class="grid" x1="700.0" y1="78" x2="700.0" y2="338"/>
<text class="axis" x="700.0" y="364" text-anchor="middle">1.00 us</text>
