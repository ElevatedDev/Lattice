<line class="axisline" x1="300" y1="338" x2="900" y2="338"/>
<line class="axisline" x1="300" y1="78" x2="300" y2="338"/>
<text class="label" x="280" y="113" text-anchor="end">Lattice source-inline elided</text>
<rect class="bar" x="300" y="96" width="141.5" height="24" fill="#0f766e"/>
<line class="err" x1="436.2" y1="108.0" x2="452.7" y2="108.0"/>
<line class="err" x1="436.2" y1="101.0" x2="436.2" y2="115.0"/>
<line class="err" x1="452.7" y1="101.0" x2="452.7" y2="115.0"/>
<text class="value" x="464.7" y="113">51 ns</text>
<text class="label" x="280" y="165" text-anchor="end">Disruptor manual fused</text>
<rect class="bar" x="300" y="148" width="318.9" height="24" fill="#b45309"/>
<line class="err" x1="609.1" y1="160.0" x2="631.9" y2="160.0"/>
<line class="err" x1="609.1" y1="153.0" x2="609.1" y2="167.0"/>
<line class="err" x1="631.9" y1="153.0" x2="631.9" y2="167.0"/>
<text class="value" x="643.9" y="165">393 ns</text>
<text class="label" x="280" y="217" text-anchor="end">Lattice physical strict topology</text>
<rect class="bar" x="300" y="200" width="431.3" height="24" fill="#0891b2"/>
<line class="err" x1="712.5" y1="212.0" x2="861.2" y2="212.0"/>
<line class="err" x1="712.5" y1="205.0" x2="712.5" y2="219.0"/>
<line class="err" x1="861.2" y1="205.0" x2="861.2" y2="219.0"/>
<text class="value" x="873.2" y="217">1.43 us</text>
<text class="label" x="280" y="269" text-anchor="end">Disruptor physical</text>
<rect class="bar" x="300" y="252" width="512.0" height="24" fill="#475569"/>
<line class="err" x1="757.5" y1="264.0" x2="831.7" y2="264.0"/>
<line class="err" x1="757.5" y1="257.0" x2="757.5" y2="271.0"/>
