<text class="label" x="280" y="321" text-anchor="end">Lattice physical pinned CPU</text>
<rect class="bar" x="300" y="304" width="441.9" height="24" fill="#06b6d4"/>
<line class="err" x1="713.5" y1="316.0" x2="842.7" y2="316.0"/>
<line class="err" x1="713.5" y1="309.0" x2="713.5" y2="323.0"/>
<line class="err" x1="842.7" y1="309.0" x2="842.7" y2="323.0"/>
<text class="value" x="854.7" y="321">1.62 us</text>
<text class="small" x="900" y="386" text-anchor="end">ns/op p99, logarithmic scale</text>
</svg>
